name: Test & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Migrations
        working-directory: ./backend
        run: npm run migrate
        env:
          DATABASE_URL: postgres://test_user:test_pass@localhost:5432/test_db
          JWT_SECRET: test_secret_key_for_ci_only_32chars
          NODE_ENV: test

      - name: Run Backend Health Check
        working-directory: ./backend
        run: npm test
        env:
          DATABASE_URL: postgres://test_user:test_pass@localhost:5432/test_db
          JWT_SECRET: test_secret_key_for_ci_only_32chars
          NODE_ENV: test

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Check Frontend Build
        working-directory: ./frontend
        run: |
          npm run build
          echo "Frontend builds successfully"

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Check Backend Syntax
        working-directory: ./backend
        run: |
          node --check server.js
          node --check config/database.js
          node --check routes/auth.js
          node --check routes/games.js
          node --check routes/leaderboard.js
          echo "All backend files pass syntax check"

  deploy-frontend:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Deploy to Vercel
        working-directory: ./frontend
        run: |
          npm install -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        working-directory: ./backend
        run: |
          npm install -g @railway/cli
          railway up --service unbeatable-games-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  notify:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Report Status
        run: |
          echo "Tests:    ${{ needs.test.result }}"
          echo "Lint:     ${{ needs.lint.result }}"
